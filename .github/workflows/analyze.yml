name: 📈 주가 추세 분석 + S&P 500 스크리너

on:
  workflow_dispatch:
    inputs:
      n:
        description: "분석 종목 수 (기본 100)"
        required: false
        default: "100"
      force_refresh:
        description: "캐시 무시하고 전체 재조회 (true/false)"
        required: false
        default: "false"
      skip_screener:
        description: "스크리닝 생략 — 추세 분석만 (true/false)"
        required: false
        default: "false"
      note:
        description: "실행 메모 (선택)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  analyze-and-deploy:
    name: 데이터 수집 → 분류 → 스크리닝 → 배포
    runs-on: ubuntu-latest

    steps:
      - name: ① Checkout
        uses: actions/checkout@v4

      - name: ② Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: ③ 패키지 설치
        run: pip install -r requirements.txt

      - name: ④ 주가 추세 분석 (3M/1Y/2Y/3Y)
        run: |
          ARGS="-n ${{ github.event.inputs.n }}"
          [ "${{ github.event.inputs.force_refresh }}" = "true" ] && ARGS="$ARGS --force"
          python analyze_stocks.py $ARGS

      - name: ⑤ S&P 500 편입/편출 스크리닝
        if: ${{ github.event.inputs.skip_screener != 'true' }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.force_refresh }}" = "true" ] && ARGS="--no-cache"
          python sp500_screener.py $ARGS

      - name: ⑥ 스크리너 데이터 없을 때 빈 파일 생성
        if: ${{ github.event.inputs.skip_screener == 'true' }}
        run: |
          echo '{"screened_at":"생략됨","inclusion_candidates":[],"exclusion_risks":[]}' \
            > screener_cache.json

      - name: ⑦ HTML 리포트 생성
        run: python build_report.py

      - name: ⑧ docs/index.html 갱신
        run: |
          mkdir -p docs
          cp output/us_stock_trend_analysis.html docs/index.html

      - name: ⑨ 결과 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_data.json screener_cache.json \
                  docs/index.html output/us_stock_trend_analysis.html
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            MSG="chore: 분석 업데이트 $(date +'%Y-%m-%d %H:%M KST')"
            [ -n "${{ github.event.inputs.note }}" ] && MSG="$MSG | ${{ github.event.inputs.note }}"
            git commit -m "$MSG"
            git push
          fi
